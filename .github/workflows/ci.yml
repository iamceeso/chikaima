name: CI

on:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: change-me-development-secret
      JWT_REFRESH_SECRET_KEY: change-me-too-development-secret
      PROVIDER_SECRET_KEY: replace-with-32-char-secret-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen --group dev

      - name: Lint backend
        run: uv run ruff check .

      - name: Test backend
        run: uv run pytest

  frontend:
    name: Frontend checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Type-check frontend
        run: pnpm typecheck

      - name: Test frontend
        run: pnpm test:unit
