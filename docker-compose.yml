services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: olanma-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: Olanma
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olanma-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Olanma API
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://olanma:olanma@postgres:5432/olanma
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production
      JWT_REFRESH_SECRET_KEY: change-me-too
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - media_storage:/app/storage

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olanma-celery-worker
    command: uv run celery -A app.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Olanma API
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://olanma:olanma@postgres:5432/olanma
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production
      JWT_REFRESH_SECRET_KEY: change-me-too
      CORS_ORIGINS: http://localhost:3000
    restart: unless-stopped
    volumes:
      - media_storage:/app/storage

  postgres:
    image: postgres:17-alpine
    container_name: olanma-postgres
    environment:
      POSTGRES_DB: olanma
      POSTGRES_USER: olanma
      POSTGRES_PASSWORD: olanma
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olanma -d olanma"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: olanma-redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  media_storage:
